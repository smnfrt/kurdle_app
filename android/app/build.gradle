plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

// Release imzalama bilgileri — android/key.properties dosyasından (gitignored).
// Dosya yoksa release build debug-key ile imzalanır ve uyarı verir.
// Mağaza yayını için bkz. docs/STORE_RELEASE.md "Signing" bölümü.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.kurdle.kurdle_app"
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.kurdle.kurdle_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties['keyAlias'] ?: 'unset'
            keyPassword = keystoreProperties['keyPassword'] ?: ''
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword'] ?: ''
        }
    }

    buildTypes {
        release {
            // Mağaza imzası — key.properties varsa release keystore kullan;
            // yoksa debug-key ile fallback (yerel test için OK, mağaza için DEĞİL).
            // Bkz. docs/STORE_RELEASE.md.
            if (keystorePropertiesFile.exists()) {
                signingConfig = signingConfigs.release
            } else {
                signingConfig = signingConfigs.debug
                logger.warn("⚠️  android/key.properties bulunamadı — release build debug-key ile imzalandı. Mağaza yayını için bkz. docs/STORE_RELEASE.md")
            }

            // ProGuard / R8 rules — gson TypeToken signature preservation.
            // flutter_local_notifications gson kullanır; signature silinince
            // release build'de scheduleDailyReminder hata atıyor.
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            // Crashlytics native (NDK) symbol upload — Crashlytics dashboard'da
            // C/C++ stack trace'lerin symbolicate olması için. Dart kodunun
            // obfuscation symbol'leri ayrı: `flutter symbolize` ile decode edilir.
            firebaseCrashlytics {
                nativeSymbolUploadEnabled true
            }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
